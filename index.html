<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Premium personalized homepage — a calm, elegant new tab experience." />
  <title>Start Page</title>

  <!-- Preconnect for performance -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- Styles -->
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/effects.css" />

  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✨</text></svg>" />
</head>
<body>
  <!-- Background Layer -->
  <div id="background" aria-hidden="true"></div>

  <!-- Theme Effects Canvas (particle effects: rain, snow, hearts, fireworks) -->
  <canvas id="effects-canvas" aria-hidden="true"></canvas>

  <!-- Main Content -->
  <div id="page-layout">

    <!-- Left Sidebar: Weather & Market -->
    <aside id="left-sidebar">

      <!-- Weather -->
      <section id="weather-section" class="sidebar-section">
        <div id="weather-card">
          <span id="weather-emoji"></span>
          <div id="weather-info">
            <span id="weather-temp"></span>
            <span id="weather-desc"></span>
            <span id="weather-location"></span>
          </div>
        </div>
      </section>

      <!-- Market Prices -->
      <section id="market-section" class="sidebar-section">
        <div id="market-card">

          <!-- Emas Pegadaian -->
          <div id="market-gold" aria-label="Harga Emas Pegadaian">
            <div class="market-icon">🥇</div>
            <div class="market-body">
              <span class="market-label">Emas Pegadaian</span>
              <div class="market-gold-rows">
                <div class="market-gold-row">
                  <span class="market-gold-tag market-tag-jual">Jual</span>
                  <span class="market-gold-jual">—</span>
                </div>
                <div class="market-gold-row">
                  <span class="market-gold-tag market-tag-beli">Beli</span>
                  <span class="market-gold-beli">—</span>
                </div>
              </div>
              <span class="market-gold-date"></span>
            </div>
          </div>

          <!-- Divider -->
          <div class="market-divider" aria-hidden="true"></div>

          <!-- IHSG -->
          <div id="market-ihsg" aria-label="IHSG IDX Composite">
            <div class="market-icon">📈</div>
            <div class="market-body">
              <span class="market-label">IHSG</span>
              <span class="market-ihsg-value">—</span>
              <span class="market-ihsg-change" data-trend="up">—</span>
            </div>
          </div>

        </div>
      </section>

      <!-- Hari Libur & Tanggal Penting -->
      <section id="holiday-section" class="sidebar-section">
        <div id="holiday-card"></div>
      </section>

    </aside>

    <!-- Center: Main Content -->
    <main id="main-content">

      <!-- Greeting (Hero) -->
      <section id="greeting-section" class="section fadeable">
        <h1 id="greeting-text"></h1>
      </section>

      <!-- Clock -->
      <section id="clock-section" class="section fadeable">
        <div id="clock-time"></div>
        <div id="clock-date"></div>
      </section>

      <!-- Search -->
      <section id="search-section" class="section">
        <div id="search-container">
          <div id="search-box">
            <!-- Search Icon -->
            <svg id="search-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <circle cx="8.5" cy="8.5" r="5.5" />
              <line x1="12.5" y1="12.5" x2="17" y2="17" />
            </svg>

            <!-- Search Input -->
            <input
              id="search-input"
              type="text"
              placeholder="Search Google..."
              autocomplete="off"
              spellcheck="false"
            />

            <!-- Keyboard Shortcut Badge -->
            <span id="search-shortcut">Ctrl+K</span>
          </div>

          <!-- Autocomplete Dropdown -->
          <div id="autocomplete-dropdown" role="listbox" aria-label="Search suggestions"></div>
        </div>
      </section>

      <!-- Quick Links -->
      <section id="quicklinks-section" class="section fadeable">
        <div id="quicklinks-grid"></div>
      </section>

    </main>

  </div>

  <!-- Sidebar Toggle Button (fixed, always visible) -->
  <button id="sidebar-toggle" aria-label="Toggle sidebar" title="Toggle sidebar (Alt+S)">
    <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="13 5 7 10 13 15"/>
    </svg>
  </button>

  <!-- Floating Letter Bubble -->
  <div id="bubble-container" aria-live="polite">
    <div id="bubble-message"></div>
  </div>

  <!-- App Entry Point (ES Module) -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
